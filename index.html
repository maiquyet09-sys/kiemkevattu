<style>

<script>
"use strict";
/* ================= Helpers ================= */
function norm(s){return (s==null?"":String(s)).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/đ/g,"d").replace(/\s+/g," ").trim();}
function esc(s){return (s==null?"":String(s)).replace(/[&<>"']/g,function(m){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m];});}
function parseNum(v){
  if(v===null||v===undefined||v==="")return 0;
  if(typeof v==="number")return v;
  var s=String(v).trim().replace(/\s/g,"");
  if(!s)return 0;
  var hasC=s.indexOf(",")>=0, hasD=s.indexOf(".")>=0;
  if(hasC&&hasD){
    if(s.lastIndexOf(",")>s.lastIndexOf("."))s=s.replace(/\./g,"").replace(",",".");
    else s=s.replace(/,/g,"");
  }else if(hasC){
    var p=s.split(",");
    s=(p.length===2&&p[1].length<=2)?s.replace(",","."):s.replace(/,/g,"");
  }else if(hasD){
    var q=s.split(".");
    if(q.length>2||(q.length===2&&q[1].length===3))s=s.replace(/\./g,"");
  }
  var n=parseFloat(s);
  return isNaN(n)?0:n;
}
function fmt(n){
  if(n===null||n===undefined||n==="")return "";
  var x=Number(n);
  return isNaN(x)?String(n):new Intl.NumberFormat("vi-VN",{maximumFractionDigits:2}).format(x);
}
function daysTo(iso){
  if(!iso)return null;
  var d=new Date(iso+"T00:00:00");
  if(isNaN(d.getTime()))return null;
  var t=new Date();t.setHours(0,0,0,0);
  return Math.round((d-t)/86400000);
}
function fmtDate(iso){if(!iso)return "";var p=iso.split("-");return p.length===3?p[2]+"/"+p[1]+"/"+p[0]:iso;}
function normKey(branch,code,name){return norm(branch)+"|"+(norm(code)||norm(name));}
function diffOf(it){return (it.counted&&it.countQty!==null)?Math.round((it.countQty-it.close)*100)/100:null;}

var BUCKETS=[
  {k:"expired",label:"Đã hết hạn",cls:"c-red",strong:"var(--red)",test:function(d){return d<0;}},
  {k:"m1",label:"Còn ≤ 1 tháng",cls:"c-org",strong:"var(--orange)",test:function(d){return d>=0&&d<=30;}},
  {k:"m3",label:"Còn ≤ 3 tháng",cls:"c-amb",strong:"var(--amber)",test:function(d){return d>30&&d<=90;}},
  {k:"m6",label:"Còn ≤ 6 tháng",cls:"c-sky",strong:"var(--sky)",test:function(d){return d>90&&d<=180;}}
];

/* ================= Lưu trữ (localStorage) ================= */
var store={
  ok:(function(){try{var t="__kk_t";localStorage.setItem(t,"1");localStorage.removeItem(t);return true;}catch(e){return false;}})(),
  load:function(){if(!store.ok)return null;try{var s=localStorage.getItem("kk_db_v1");return s?JSON.parse(s):null;}catch(e){return null;}},
  save:function(){if(!store.ok)return;try{localStorage.setItem("kk_db_v1",JSON.stringify(db));}catch(e){console.error(e);toast("Không lưu được — bộ nhớ trình duyệt đầy?");}}
};
var saveT=null;
function saveSoon(){clearTimeout(saveT);saveT=setTimeout(store.save,400);}

/* ================= Nhận diện cột Excel ================= */
var FIELDS=[
  {k:"branch",label:"Chi nhánh / Kho"},
  {k:"code",label:"Mã vật tư"},
  {k:"name",label:"Tên vật tư"},
  {k:"unit",label:"ĐVT"},
  {k:"open",label:"Tồn đầu kỳ"},
  {k:"in",label:"Nhập trong kỳ"},
  {k:"out",label:"Xuất trong kỳ"},
  {k:"close",label:"Tồn cuối kỳ"}
];
var KW={
  unit:[/^dvt$/,/don vi tinh/,/^don vi$/],
  open:[/ton dau/,/dau ky/],
  close:[/ton cuoi/,/cuoi ky/,/du cuoi/],
  "in":[/nhap/],
  out:[/xuat/],
  branch:[/chi nhanh/,/^kho( |$)/,/co so/,/ma kho/,/ten kho/],
  code:[/ma (so )?vat tu/,/ma vt/,/ma hang/,/^ma( so)?$/],
  name:[/ten vat tu/,/ten vt/,/ten hang/,/^ten$/,/ten/]
};
var ORDER=["unit","open","close","in","out","branch","code","name"];

function autoMap(headers){
  var H=headers.map(function(h){return norm(h);});
  var used={},map={};
  ORDER.forEach(function(f){
    var best=-1,bestScore=0;
    H.forEach(function(h,i){
      if(used[i]||!h)return;
      var hit=KW[f].some(function(re){return re.test(h);});
      if(hit){
        var sc=1;
        if(/so luong|(^| )sl( |$)/.test(h))sc+=1;
        if(/gia tri|thanh tien|(^| )gt( |$)|don gia|tien/.test(h))sc-=1;
        if(sc>bestScore){bestScore=sc;best=i;}
      }
    });
    if(best>=0&&bestScore>0){map[f]=best;used[best]=true;}
  });
  return map;
}
function detectHeaderRow(rows){
  var best=0,bestScore=0,n=Math.min(rows.length,20);
  for(var r=0;r<n;r++){
    var sc=0,row=rows[r]||[];
    for(var c=0;c<row.length;c++){
      var h=norm(row[c]);
      if(!h)continue;
      for(var f=0;f<ORDER.length;f++){
        if(KW[ORDER[f]].some(function(re){return re.test(h);})){sc++;break;}
      }
    }
    if(sc>bestScore){bestScore=sc;best=r;}
  }
  return bestScore>=3?best:0;
}
function colName(i){var s="";i++;while(i>0){s=String.fromCharCode(65+((i-1)%26))+s;i=Math.floor((i-1)/26);}return s;}

function buildItems(rows,start,map,branchManual,hsd){
  var out=[];
  function get(row,k){return map[k]===undefined?"":row[map[k]];}
  for(var r=start;r<rows.length;r++){
    var row=rows[r]||[];
    var name=String(get(row,"name")==null?"":get(row,"name")).trim();
    var code=String(get(row,"code")==null?"":get(row,"code")).trim();
    if(!name&&!code)continue;
    var nn=norm(name);
    if(nn.indexOf("tong cong")===0||nn==="cong"||nn.indexOf("tong so")===0)continue;
    var open=parseNum(get(row,"open"));
    var inn=parseNum(get(row,"in"));
    var outn=parseNum(get(row,"out"));
    var close=map.close!==undefined?parseNum(get(row,"close")):open+inn-outn;
    var branch=(map.branch!==undefined?String(get(row,"branch")==null?"":get(row,"branch")).trim():"")||branchManual.trim()||"Kho chính";
    var reg=hsd[normKey(branch,code,name)];
    out.push({
      id:"i"+r+"_"+out.length,branch:branch,code:code,name:name,
      unit:String(get(row,"unit")==null?"":get(row,"unit")).trim(),
      open:open,"in":inn,out:outn,close:close,
      counted:false,countQty:null,note:"",
      batches:reg?reg.batches.map(function(b){return {qty:b.qty,exp:b.exp};}):[]
    });
  }
  return out;
}

/* ================= Xuất Excel ================= */
var XLSX_MIME="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet";
function fileNameOf(p){return ("KiemKe_"+p.name).replace(/[^\w-]+/g,"_")+".xlsx";}
function dlAnchor(blob,fname){
  try{
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    a.href=url;a.download=fname;
    document.body.appendChild(a);a.click();
    setTimeout(function(){URL.revokeObjectURL(url);if(a.parentNode)a.parentNode.removeChild(a);},4000);
    toast("Đã tải file — xem trong Tải xuống / app Tệp");
  }catch(e){console.error(e);toast("Trình duyệt chặn tải file — mở lại bằng Chrome/Safari");}
}
function shareOrDownload(blob,fname){
  var file=null;
  try{file=new File([blob],fname,{type:blob.type});}catch(e){file=null;}
  if(file&&navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
    navigator.share({files:[file],title:fname}).then(function(){
      toast("Đã xuất — chọn nơi lưu/gửi trong bảng chia sẻ");
    }).catch(function(err){
      if(err&&err.name==="AbortError"){toast("Đã hủy xuất file");return;}
      dlAnchor(blob,fname);
    });
    return;
  }
  dlAnchor(blob,fname);
}
function hsdRowsOf(p){
  var rows=[];
  p.items.forEach(function(it){
    (it.batches||[]).forEach(function(b){
      if(!b.exp)return;
      var d=daysTo(b.exp),bk=null;
      for(var i=0;i<BUCKETS.length;i++){if(BUCKETS[i].test(d)){bk=BUCKETS[i];break;}}
      rows.push([it.branch,it.code,it.name,it.unit,(b.qty===null||b.qty===undefined)?"":b.qty,fmtDate(b.exp),d,bk?bk.label:"Còn > 6 tháng"]);
    });
  });
  rows.sort(function(a,b){return a[6]-b[6];});
  return rows;
}
/* Dựng file theo đúng biểu mẫu BIÊN BẢN KIỂM KÊ (mỗi kho 1 sheet) */
function buildBienBan(p){
  var wb=new ExcelJS.Workbook();
  wb.calcProperties.fullCalcOnLoad=true;
  var d=new Date(p.createdAt);
  var thang=d.getMonth()+1,nam=d.getFullYear();
  var thin={style:"thin"};
  var bAll={top:thin,left:thin,bottom:thin,right:thin};
  var branches=[];
  p.items.forEach(function(it){if(branches.indexOf(it.branch)<0)branches.push(it.branch);});
  var used={};
  branches.forEach(function(br){
    var items=p.items.filter(function(it){return it.branch===br;});
    var sname=String(br||"Kho").replace(/[\[\]\*\?\/\\:']/g," ").replace(/\s+/g," ").trim().substring(0,31)||"Kho";
    var base=sname,k=2;
    while(used[sname.toLowerCase()]){sname=base.substring(0,28)+" "+k;k++;}
    used[sname.toLowerCase()]=1;
    var ws=wb.addWorksheet(sname,{views:[{state:"frozen",ySplit:4}]});
    [4.43,14.57,52,12.29,14.57,14.57,14.57,14.57,11.43,11.43,49.29].forEach(function(w,i){ws.getColumn(i+1).width=w;});
    var last=4+items.length;
    ws.mergeCells(1,1,1,11);
    var c=ws.getCell(1,1);
    c.value="BIÊN BẢN KIỂM KÊ";

function exportExcel(p){
  var fname=fileNameOf(p);
  if(typeof ExcelJS!=="undefined"){
    buildBienBan(p).xlsx.writeBuffer().then(function(buf){
      shareOrDownload(new Blob([buf],{type:XLSX_MIME}),fname);
    }).catch(function(e){console.error(e);exportExcelBasic(p,fname);});
    return;
  }
  exportExcelBasic(p,fname);
}
function exportExcelBasic(p,fname){
  if(typeof XLSX==="undefined"){toast("Chưa tải được thư viện Excel — kiểm tra kết nối mạng");return;}
  var rows=p.items.map(function(it,i){
    return {"STT":i+1,"Chi nhánh/Kho":it.branch,"Mã hàng":it.code,"Tên hàng":it.name,"ĐVT":it.unit,
      "Đầu kỳ":it.open,"Nhập kho":it["in"],"Xuất kho":it.out,"Cuối kỳ":it.close,
      "Kiểm kê":it.counted?it.countQty:"","Chênh":it.counted?diffOf(it):"","Ghi chú":it.note||""};
  });
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),"Kiem ke");
  var out=XLSX.write(wb,{bookType:"xlsx",type:"array"});
  shareOrDownload(new Blob([out],{type:XLSX_MIME}),fname);
}

/* ================= Màn hình kiểm kê ================= */
function baseList(p){
  var nq=norm(P.q);
  return p.items.filter(function(i){
    if(P.br!=="all"&&i.branch!==P.br)return false;
    if(nq&&norm(i.name).indexOf(nq)<0&&norm(i.code).indexOf(nq)<0)return false;
    return true;
  });
}
function renderPeriod(){
  var p=per(P.id);
  if(!p){route={view:"home"};render();return;}
  var h='<div class="topbar"><div class="trow wrap">'+
    '<button class="back" onclick="A.go(\'home\')">‹</button>'+
    '<div class="ttl">'+esc(p.name)+'</div>'+
    '<button class="pill" onclick="A.exportCur()">Xuất Excel</button></div>'+
    '<div class="wrap" style="padding-top:10px"><div class="bar"><div class="fill" id="pfill"></div></div>'+
    '<div class="prow"><span id="pdone"></span><span id="pdiff"></span></div></div>'+
    '<div class="wrap" style="padding-bottom:8px"><input class="inp" style="background:#fafaf9" id="q" placeholder="Tìm tên hoặc mã vật tư (không dấu vẫn ra)…" oninput="A.qInput(this.value)"></div>'+
    '<div class="chips" id="chips"></div></div>'+
    '<div class="wrap" id="list" style="padding-top:12px;padding-bottom:110px"></div>'+
    '<div class="botbar"><div class="botin"><button class="btn btn-primary" id="seqbtn" onclick="A.seqStart()"></button></div></div>';
  document.getElementById("app").innerHTML=h;
  document.getElementById("q").value=P.q;
  renderList();
}
function renderChips(p,base){
  var branches=[];
  p.items.forEach(function(i){if(i.branch&&branches.indexOf(i.branch)<0)branches.push(i.branch);});
  var cnt=function(k){
    return base.filter(function(i){
      if(k==="todo")return !i.counted;
      if(k==="done")return i.counted;
      return i.counted&&diffOf(i)!==0;
    }).length;
  };
  var h="";
  if(branches.length>1){
    h+='<select class="chip" onchange="A.setBr(this.value)"><option value="all"'+(P.br==="all"?" selected":"")+'>Tất cả kho</option>';
    branches.forEach(function(b){h+='<option value="'+esc(b)+'"'+(P.br===b?" selected":"")+'>'+esc(b)+'</option>';});
    h+='</select>';
  }
  [["all","Tất cả "+base.length],["todo","Chưa kiểm "+cnt("todo")],["diff","Chênh lệch "+cnt("diff")],["done","Đã kiểm "+cnt("done")]].forEach(function(c){
    h+='<button class="chip'+(P.flt===c[0]?" chip-on":"")+'" onclick="A.setFlt(\''+c[0]+'\')">'+c[1]+'</button>';
  });
  document.getElementById("chips").innerHTML=h;
}
function renderList(){
  var p=per(P.id);if(!p)return;
  var base=baseList(p);
  var list=base.filter(function(i){
    if(P.flt==="todo")return !i.counted;
    if(P.flt==="done")return i.counted;
    if(P.flt==="diff")return i.counted&&diffOf(i)!==0;
    return true;
  });
  var total=p.items.length;
  var done=p.items.filter(function(i){return i.counted;}).length;
  var ndiff=p.items.filter(function(i){return i.counted&&diffOf(i)!==0;}).length;
  var pct=total?Math.round(done/total*100):0;
  var allDone=total>0&&done===total;
  document.getElementById("pfill").style.width=pct+"%";
  document.getElementById("pdone").innerHTML='Đã kiểm <b class="tnum" style="color:#1c1917">'+done+"/"+total+"</b> · "+pct+"%";
  document.getElementById("pdiff").innerHTML=ndiff>0?'<b style="color:var(--red)">'+ndiff+" mã chênh lệch</b>":"Chưa có chênh lệch";
  document.getElementById("seqbtn").textContent=allDone?"✓ Hoàn tất — Xuất báo cáo Excel":"▶ Kiểm tuần tự · còn "+(total-done)+" mã";
  renderChips(p,base);

  var branchesMulti=false;
  var seen={};
  for(var i=0;i<p.items.length;i++){seen[p.items[i].branch]=1;}
  branchesMulti=Object.keys(seen).length>1;

  var h="";
  if(!list.length)h='<div class="empty">Không có vật tư nào khớp bộ lọc.</div>';
  list.slice(0,P.limit).forEach(function(it){
    var d=diffOf(it);
    var worst=null;
    (it.batches||[]).forEach(function(b){var x=daysTo(b.exp);if(x!==null&&(worst===null||x<worst))worst=x;});
    var badges="";
    if(!it.counted)badges+='<span class="bdg">Chưa kiểm</span>';
    else if(d===0)badges+='<span class="bdg bdg-ok">✓ Khớp</span>';
    else if(d>0)badges+='<span class="bdg bdg-plus">+'+fmt(d)+' Thừa</span>';
    else badges+='<span class="bdg bdg-minus">−'+fmt(Math.abs(d))+' Thiếu</span>';
    if(worst!==null&&worst<=90){
      badges+='<span class="bdg '+(worst<0?"bdg-minus":worst<=30?"bdg-org":"bdg-plus")+'">HSD '+(worst<0?"quá hạn":"còn "+worst+"d")+'</span>';
    }
    var sub=[it.code,it.unit,branchesMulti?it.branch:null].filter(function(x){return x;}).map(esc).join(" · ");
    h+='<div class="item" onclick="A.openItem(\''+it.id+'\',false)">'+
      '<div style="flex:1;min-width:0"><div class="iname">'+esc(it.name)+'</div>'+
      '<div class="isub">'+sub+'</div><div class="ibadges">'+badges+'</div></div>'+
      '<div class="iright"><div class="iqty tnum">'+fmt(it.close)+'</div><div class="ilab">tồn cuối</div></div></div>';
  });
  if(list.length>P.limit){
    h+='<button class="addbat" style="display:block;width:100%;text-align:center;padding:12px 0" onclick="A.more()">Xem thêm ('+(list.length-P.limit)+' mã còn lại)</button>';
  }
  document.getElementById("list").innerHTML=h;
}

/* ================= Sheet nhập kiểm kê ================= */
function openSheet(itemId,seq){
  var p=per(P.id);if(!p)return;
  var it=null;
  for(var i=0;i<p.items.length;i++)if(p.items[i].id===itemId){it=p.items[i];break;}
  if(!it)return;
  SB={itemId:itemId,seq:!!seq,batches:(it.batches||[]).map(function(b){return {qty:(b.qty===null||b.qty===undefined)?"":String(b.qty),exp:b.exp||""};})};
  var done=p.items.filter(function(x){return x.counted;}).length;
  var total=p.items.length;
  var h='<div class="ovl" id="ovl"><div class="sheet" onclick="event.stopPropagation()">'+
    '<div class="shead"><div style="flex:1;min-width:0">'+
    (seq?'<div style="font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--teal);margin-bottom:4px">Kiểm tuần tự · đã kiểm '+done+"/"+total+'</div>':"")+
    '<div style="font-weight:700;font-size:17px;line-height:1.35">'+esc(it.name)+'</div>'+
    '<div style="font-size:12px;color:var(--mut);margin-top:4px">'+[it.code,it.unit,it.branch].filter(function(x){return x;}).map(esc).join(" · ")+'</div></div>'+
    '<button class="sx" onclick="A.closeSheet()">✕</button></div>'+
    '<div class="sgrid">'+
    '<div class="scell"><div class="l">Tồn đầu</div><div class="v tnum">'+fmt(it.open)+'</div></div>'+
    '<div class="scell"><div class="l">Nhập</div><div class="v tnum">'+fmt(it["in"])+'</div></div>'+
    '<div class="scell"><div class="l">Xuất</div><div class="v tnum">'+fmt(it.out)+'</div></div>'+
    '<div class="scell scell-hl"><div class="l">Tồn cuối</div><div class="v tnum">'+fmt(it.close)+'</div></div></div>'+
    '<div style="padding:16px 20px 0"><label class="lbl">Số lượng kiểm kê thực tế</label>'+
    '<input class="qtyinp" id="sqty" inputmode="decimal" placeholder="Nhập số đếm được" value="'+(it.counted&&it.countQty!==null?esc(String(it.countQty)):"")+'" oninput="A.calc()"></div>'+
    '<div style="padding:12px 20px 0" id="sban"></div>'+
    '<div style="padding:16px 20px 0"><label class="lbl" id="snotelbl">Ghi chú / giải trình</label>'+
    '<textarea class="inp" id="snote" rows="2" oninput="A.calc()">'+esc(it.note||"")+'</textarea>'+
    '<div id="snotehint"></div></div>'+
    '<div style="padding:16px 20px 0"><label class="lbl">Hạn sử dụng (theo lô)</label>'+
    '<div id="sbat"></div>'+
    '<button class="addbat" onclick="A.batAdd()">+ Thêm lô / hạn sử dụng</button>'+
    '<div style="font-size:12px;color:#a8a29e;margin-top:4px">HSD được lưu và tự kế thừa sang kỳ kiểm kê sau.</div></div>'+
    '<div class="sbtns"><button class="btn btn-outline" id="ssave" onclick="A.sheetSave(false)">Lưu</button>'+
    '<button class="btn btn-primary" id="snext" onclick="A.sheetSave(true)">Lưu &amp; kiểm tiếp →</button></div>'+
    (it.counted?'<button class="reset" onclick="A.sheetReset()">Xóa kết quả, đưa về "chưa kiểm"</button>':"")+
    '</div></div>';
  document.getElementById("modal").innerHTML=h;
  document.getElementById("ovl").addEventListener("click",function(e){if(e.target===this)A.closeSheet();});
  SB._close=it.close;SB._unit=it.unit;
  renderBatches();
  A.calc();
  setTimeout(function(){var el=document.getElementById("sqty");if(el)el.focus();},60);
}
function renderBatches(){
  var h="";
  SB.batches.forEach(function(b,i){
    var d=daysTo(b.exp);
    var dTxt=d===null?"":(d<0?"quá "+Math.abs(d)+"d":d+"d");
    var dCol=d===null?"#a8a29e":(d<0?"var(--red)":d<=30?"var(--orange)":d<=90?"var(--amber)":"#a8a29e");
    h+='<div class="batrow">'+
      '<input class="inp batqty" inputmode="decimal" placeholder="SL" value="'+esc(b.qty)+'" oninput="A.bat('+i+',\'qty\',this.value)">'+
      '<input class="inp batdate" type="date" value="'+esc(b.exp)+'" onchange="A.bat('+i+',\'exp\',this.value)">'+
      '<span class="batd" style="color:'+dCol+'">'+dTxt+'</span>'+
      '<button class="batx" onclick="A.batDel('+i+')">✕</button></div>';
  });
  document.getElementById("sbat").innerHTML=h;
}
function applyItem(item){
  var p=per(P.id);if(!p)return;
  for(var i=0;i<p.items.length;i++)if(p.items[i].id===item.id){p.items[i]=item;break;}
  var key=normKey(item.branch,item.code,item.name);
  var dated=(item.batches||[]).filter(function(b){return b.exp;});
  if(dated.length)db.hsd[key]={branch:item.branch,code:item.code,name:item.name,unit:item.unit,batches:dated,updatedAt:Date.now()};
  else delete db.hsd[key];
  saveSoon();
  renderList();
}

/* ================= Dashboard HSD ================= */
function renderHsd(){
  var entries=hsdEntries();
  var h='<div class="topbar"><div class="trow wrap"><button class="back" onclick="A.go(\'home\')">‹</button><div class="ttl">Cảnh báo hạn sử dụng</div></div><div style="height:10px"></div></div>';
  h+='<div class="wrap" style="padding-top:16px;padding-bottom:40px">';
  if(!entries.length){
    h+='<div class="empty">Chưa có dữ liệu HSD. Nhập hạn sử dụng khi kiểm kê — hệ thống sẽ lưu và cảnh báo tại đây.</div>';
  }
  BUCKETS.forEach(function(b){
    var rows=entries.filter(function(e){return b.test(e.days);});
    h+='<div style="margin-bottom:20px"><div style="font-size:14px;font-weight:700;color:'+b.strong+';margin-bottom:8px">'+b.label+' · '+rows.length+'</div>';
    if(!rows.length)h+='<div style="font-size:12px;color:#a8a29e">Không có.</div>';
    rows.forEach(function(e){
      h+='<div class="hsditem"><div style="flex:1;min-width:0">'+
        '<div style="font-weight:600;font-size:14px;line-height:1.35">'+esc(e.name)+'</div>'+
        '<div style="font-size:12px;color:var(--mut);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+
        [e.code,e.branch].filter(function(x){return x;}).map(esc).join(" · ")+
        (e.qty!==null&&e.qty!==undefined&&e.qty!==""?" · SL "+fmt(e.qty):"")+'</div></div>'+
        '<div style="text-align:right;flex:0 0 auto"><div class="tnum" style="font-size:14px;font-weight:700">'+fmtDate(e.exp)+'</div>'+
        '<div class="tnum" style="font-size:12px;font-weight:700;color:'+b.strong+'">'+(e.days<0?"quá hạn "+Math.abs(e.days)+" ngày":"còn "+e.days+" ngày")+'</div></div></div>';
    });
    h+='</div>';
  });
  h+='</div>';
  document.getElementById("app").innerHTML=h;
}

/* ================= Router & Actions ================= */
function render(){
  document.getElementById("modal").innerHTML="";
  SB=null;
  if(route.view==="home")renderHome();
  else if(route.view==="upload")renderUpload();
  else if(route.view==="period")renderPeriod();
  else if(route.view==="hsd")renderHsd();
  window.scrollTo(0,0);
}

var A={
  go:function(v){
    if(v==="upload"){
      var now=new Date();
      UP={wb:null,sheet:"",rows:null,hr:0,start:1,map:{},branchManual:"",
        pname:"Kiểm kê "+String(now.getMonth()+1).padStart(2,"0")+"/"+now.getFullYear()};
    }
    route={view:v};render();
  },
  onFile:function(input){
    var f=input.files&&input.files[0];
    if(!f)return;
    var isCsv=/\.csv$/i.test(f.name);
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var wb=isCsv?XLSX.read(e.target.result,{type:"string"}):XLSX.read(new Uint8Array(e.target.result),{type:"array"});
        UP.wb=wb;
        A.upSheet(wb.SheetNames[0]);
      }catch(err){console.error(err);toast("Không đọc được file — kiểm tra định dạng .xlsx/.csv");}
    };
    reader.onerror=function(){toast("Không đọc được file");};
    if(isCsv)reader.readAsText(f);else reader.readAsArrayBuffer(f);
  },
  upSheet:function(name){
    var ws=UP.wb.Sheets[name];
    var rs=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
    var hr=detectHeaderRow(rs);
    UP.sheet=name;UP.rows=rs;UP.hr=hr;UP.start=Math.min(rs.length,hr+1);
    UP.map=autoMap((rs[hr]||[]).map(function(x){return String(x);}));
    renderUpload();
  },
  upHr:function(v){
    var x=Math.max(1,Math.min(UP.rows.length,Number(v)||1))-1;
    UP.hr=x;UP.start=Math.min(UP.rows.length,x+1);
    UP.map=autoMap((UP.rows[x]||[]).map(function(y){return String(y);}));
    renderUpload();
  },
  upStart:function(v){UP.start=Math.max(0,Math.min(UP.rows.length,Number(v)||1)-1);renderUpload();},
  upMap:function(k,v){if(v==="")delete UP.map[k];else UP.map[k]=Number(v);renderUpload();},
  upBranch:function(v){UP.branchManual=v;renderUpload();},
  createPeriod:function(){
    var items=UP._built||buildItems(UP.rows,UP.start,UP.map,UP.branchManual,db.hsd);
    if(UP.map.name===undefined||!items.length){toast("Cần chọn cột Tên vật tư và có dữ liệu");return;}
    var p={id:Date.now().toString(36),name:(UP.pname||"").trim()||"Kỳ kiểm kê",createdAt:Date.now(),items:items};
    db.periods.unshift(p);
    store.save();
    P={id:p.id,q:"",flt:"all",br:"all",limit:80};
    route={view:"period"};render();
    toast("Đã tạo kỳ kiểm kê · "+items.length+" mã VT");
  },
  openPeriod:function(id){P={id:id,q:"",flt:"all",br:"all",limit:80};route={view:"period"};render();},
  delPeriod:function(id){
    if(!confirm("Xóa kỳ kiểm kê này? Không thể hoàn tác."))return;
    db.periods=db.periods.filter(function(p){return p.id!==id;});
    store.save();render();
  },
  qInput:function(v){clearTimeout(qT);qT=setTimeout(function(){P.q=v;P.limit=80;renderList();},150);},
  setFlt:function(k){P.flt=k;P.limit=80;renderList();},
  setBr:function(v){P.br=v;P.limit=80;renderList();},
  more:function(){P.limit+=100;renderList();},
  exportCur:function(){
    var p=per(P.id);if(!p)return;
    try{exportExcel(p);}catch(e){console.error(e);toast("Không xuất được file trên thiết bị này");}
  },
  openItem:function(id,seq){openSheet(id,seq);},
  closeSheet:function(){document.getElementById("modal").innerHTML="";SB=null;},
  seqStart:function(){
    var p=per(P.id);if(!p)return;
    var done=p.items.filter(function(i){return i.counted;}).length;
    if(p.items.length>0&&done===p.items.length){A.exportCur();return;}
    var base=baseList(p);
    for(var i=0;i<base.length;i++){
      if(!base[i].counted){openSheet(base[i].id,true);return;}
    }
    toast("Không còn mã nào chưa kiểm trong bộ lọc hiện tại");
  },
  calc:function(){
    if(!SB)return;
    var qv=document.getElementById("sqty").value.trim();
    var note=document.getElementById("snote").value.trim();
    var ban=document.getElementById("sban");
    var lbl=document.getElementById("snotelbl");
    var hint=document.getElementById("snotehint");
    var qn=qv===""?null:parseNum(qv);
    var diff=qn===null?null:Math.round((qn-SB._close)*100)/100;
    if(diff===null){ban.innerHTML="";}
    else if(diff===0){ban.innerHTML='<div class="ban ban-ok">✓ Khớp tồn kho sổ sách</div>';}
    else if(diff>0){ban.innerHTML='<div class="ban ban-plus">▲ THỪA '+fmt(diff)+" "+esc(SB._unit||"")+' so với sổ sách</div>';}
    else{ban.innerHTML='<div class="ban ban-minus">▼ THIẾU '+fmt(Math.abs(diff))+" "+esc(SB._unit||"")+' so với sổ sách</div>';}
    var needNote=diff!==null&&diff!==0&&!note;
    lbl.textContent="Ghi chú / giải trình"+(diff!==null&&diff!==0?" (bắt buộc)":"");
    lbl.style.color=needNote?"var(--red)":"";
    hint.innerHTML=needNote?'<div class="hint-red">Có chênh lệch — bắt buộc nhập nguyên nhân trước khi lưu.</div>':"";
    var can=qn!==null&&!needNote;
    document.getElementById("ssave").disabled=!can;
    document.getElementById("snext").disabled=!can;
  },
  bat:function(i,k,v){SB.batches[i][k]=v;if(k==="exp")renderBatches();},
  batAdd:function(){SB.batches.push({qty:"",exp:""});renderBatches();},
  batDel:function(i){SB.batches.splice(i,1);renderBatches();},
  sheetSave:function(advance){
    if(!SB)return;
    var p=per(P.id);if(!p)return;
    var it=null;
    for(var i=0;i<p.items.length;i++)if(p.items[i].id===SB.itemId){it=p.items[i];break;}
    if(!it)return;
    var qv=document.getElementById("sqty").value.trim();
    if(qv===""){toast("Nhập số lượng kiểm kê");return;}
    var qn=parseNum(qv);
    var note=document.getElementById("snote").value.trim();
    var diff=Math.round((qn-it.close)*100)/100;
    if(diff!==0&&!note){toast("Bắt buộc nhập giải trình khi có chênh lệch");return;}
    var batches=SB.batches.filter(function(b){return b.exp;}).map(function(b){
      return {qty:(b.qty===""?null:parseNum(b.qty)),exp:b.exp};
    });
    var updated={};
    Object.keys(it).forEach(function(k){updated[k]=it[k];});
    updated.counted=true;updated.countQty=qn;updated.note=note;updated.batches=batches;
    var wasSeq=SB.seq,savedId=SB.itemId;
    applyItem(updated);
    if(advance){
      var base=baseList(p);
      var idx=-1;
      for(var j=0;j<base.length;j++)if(base[j].id===savedId){idx=j;break;}
      var next=null;
      for(var k2=1;k2<=base.length;k2++){
        var cand=base[(idx+k2)%base.length];
        if(!cand.counted&&cand.id!==savedId){next=cand;break;}
      }
      if(next){openSheet(next.id,true);}
      else{
        A.closeSheet();
        toast("Đã kiểm xong 100% ✓ — xuất Excel để lưu hồ sơ");
      }
    }else{
      A.closeSheet();
      toast("Đã lưu");
    }
  },
  sheetReset:function(){
    if(!SB)return;
    var p=per(P.id);if(!p)return;
    var it=null;
    for(var i=0;i<p.items.length;i++)if(p.items[i].id===SB.itemId){it=p.items[i];break;}
    if(!it)return;
    var updated={};
    Object.keys(it).forEach(function(k){updated[k]=it[k];});
    updated.counted=false;updated.countQty=null;
    applyItem(updated);
    A.closeSheet();
    toast('Đã đưa về "chưa kiểm"');
  }
};

/* ================= Init ================= */
(function(){
  var saved=store.load();
  if(saved&&saved.periods)db=saved;
  render();
})();
</script>
</body>
